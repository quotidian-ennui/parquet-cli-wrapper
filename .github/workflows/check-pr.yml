name: Check PR
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions: {}

jobs:
  check-pr:
    uses: quotidian-ennui/workflows-olio/.github/workflows/check-pr-with-trigger.yml@bc5a8ca54a283873850632edff9d64a78431e63c # v2.2.3
    permissions:
      contents: write
      pull-requests: write
      checks: write
