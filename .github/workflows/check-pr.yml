name: Check PR
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions: {}

jobs:
  check-pr:
    uses: quotidian-ennui/workflows-olio/.github/workflows/check-pr-with-trigger.yml@eff82979a276acf5fdad410c646fc2527dbc3331 # v2.2.4
    permissions:
      contents: write
      pull-requests: write
      checks: write
